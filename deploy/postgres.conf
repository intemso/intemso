# PostgreSQL 16 — Tuned for Hetzner CX23 (4GB RAM, 2 vCPU, shared with Redis + API + Web)
# Postgres gets ~1GB of the 4GB total

listen_addresses = '*'

# ── Memory ──
shared_buffers = 256MB            # 25% of Postgres's 1GB limit
effective_cache_size = 768MB      # How much OS cache Postgres can expect
work_mem = 4MB                    # Per-sort/hash operation (conservative — many queries run concurrently)
maintenance_work_mem = 64MB       # For VACUUM, CREATE INDEX
wal_buffers = 8MB                 # WAL write buffer

# ── Connections ──
max_connections = 40              # More than enough for early stage (API pool + migrate + admin)

# ── Write-Ahead Log ──
wal_level = replica               # Enables point-in-time recovery later
checkpoint_completion_target = 0.9
min_wal_size = 64MB
max_wal_size = 256MB

# ── Query Planner ──
random_page_cost = 1.1            # SSD storage — sequential and random reads are similar cost
effective_io_concurrency = 200    # SSD can handle many concurrent I/O operations
default_statistics_target = 100

# ── Logging (for debugging, not excessive) ──
log_min_duration_statement = 1000 # Log queries slower than 1 second
log_checkpoints = on
log_connections = off             # Don't log every connection (noisy in containers)
log_disconnections = off
log_lock_waits = on
log_temp_files = 0                # Log all temp file usage
log_timezone = 'UTC'

# ── Autovacuum (keep tables clean) ──
autovacuum = on
autovacuum_max_workers = 2        # Only 2 CPU cores
autovacuum_naptime = 60s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ── Locale ──
timezone = 'UTC'
lc_messages = 'en_US.utf8'
