services:
  postgres:
    image: postgres:16-alpine
    container_name: intemso-postgres
    restart: unless-stopped
    # No external port — only accessible from other containers (security)
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-intemso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-intemso}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres.conf:/etc/postgresql/custom.conf:ro
    command: postgres -c config_file=/etc/postgresql/custom.conf
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intemso}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: intemso-redis
    restart: unless-stopped
    # No external port — only accessible from other containers (security)
    expose:
      - "6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --appendonly no
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: intemso-api
    restart: unless-stopped
    # Bind to localhost only — accessible to host Nginx but not from internet
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-intemso}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-intemso}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_TLS: ${REDIS_TLS:-false}
      API_BASE_URL: ${API_BASE_URL:-https://intemso.com/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://intemso.com,https://www.intemso.com}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-https://intemso.com}
      # Node.js memory optimization for 4GB box
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://intemso.com/api/v1}
    container_name: intemso-web
    restart: unless-stopped
    # Bind to localhost only — accessible to host Nginx but not from internet
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://intemso.com/api/v1}
      NODE_OPTIONS: "--max-old-space-size=384"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Run migrations before starting the API
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    container_name: intemso-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-intemso}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-intemso}
    command: npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  redis_data:
