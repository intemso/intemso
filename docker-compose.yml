services:
  postgres:
    image: postgres:16-alpine
    container_name: intemso-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: intemso
      POSTGRES_PASSWORD: intemso123
      POSTGRES_DB: intemso
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: intemso-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
